# tls-guard port rules
# <port> <mode> [<upstream_port>]
#
# Modes:
#   guard   — modern TLS passes through in-kernel; legacy gets error page
#   proxy   — modern TLS passes through in-kernel; legacy is MITM-proxied via modern TLS
#   upgrade — all plaintext traffic is wrapped in TLS to <upstream_port>
#
# guard and proxy use NFQUEUE to classify modern vs legacy TLS.
# upgrade intercepts unconditionally (no classification needed).

443  guard              # HTTPS: legacy → error page, modern → passthrough

110  upgrade  995       # POP3 → POP3S
143  upgrade  993       # IMAP → IMAPS
25   upgrade  465       # SMTP → SMTPS
587  upgrade  465       # SMTP submission → SMTPS

# Uncomment to MITM-proxy legacy TLS instead of showing error page:
# 443  proxy             # HTTPS: legacy → transparent proxy, modern → passthrough

# Other protocols:
# 119  upgrade  563     # NNTP → NNTPS
# 389  upgrade  636     # LDAP → LDAPS
